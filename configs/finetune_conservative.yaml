# Phase 2A — Conservative fine-tuning on a 2-year warmup of the target basin.
# Freezes the LSTM cell and trains only the dense head.
name: finetune_conservative_target
stage: finetune_conservative
seed: 42

data:
  source: camels
  camels_root: data
  target_basin: "11264500"              # Merced R at Happy Isles (snowmelt-dominated)
  # 2-yr warmup envelope split so validation TARGET days (2010-09..12) are
  # disjoint from training target days. Validation period starts 365 d early
  # because sequences need in-period history; the old 4-month
  # validation_period produced ZERO sequences (hence val_loss = NaN).
  warmup_period: ["2009-01-01", "2010-08-31"]      # training targets end 2010-08-31
  validation_period: ["2009-09-02", "2010-12-31"]  # val targets 2010-09-01..12-31
  sequence_length: 365

model:
  pretrained_checkpoint: results/checkpoints/pretrain_subset200.pt
  hidden_size: 256
  dropout: 0.4

training:
  batch_size: 64
  epochs: 5
  patience: 3
  head_lr: 1.0e-3
  weight_decay: 0.0

output:
  checkpoint_path: results/checkpoints/finetune_conservative.pt
  history_path:    results/history/finetune_conservative.json
