# Local baseline — EA-LSTM trained from scratch on the 2-year warmup only.
name: local_baseline_target
stage: local_baseline
seed: 42

data:
  source: camels
  camels_root: data
  target_basin: "11264500"
  # Split so validation TARGET days are disjoint from training target days;
  # val period includes its own 365-d history (old 4-month period yielded
  # zero sequences -> val_loss = NaN). See finetune_conservative.yaml.
  warmup_period: ["2009-01-01", "2010-08-31"]
  validation_period: ["2009-09-02", "2010-12-31"]
  sequence_length: 365

model:
  hidden_size: 256
  dropout: 0.4

training:
  batch_size: 64
  epochs: 50
  patience: 10
  head_lr: 1.0e-3

output:
  checkpoint_path: results/checkpoints/local_baseline.pt
  history_path:    results/history/local_baseline.json
