# Quantifies minimum local record length for useful transfer.
name: min_data_sensitivity
stage: min_data_sensitivity
seed: 42

data:
  source: camels
  camels_root: data
  target_basin: "11264500"
  warmup_start: "2009-01-01"                       # CAMELS data ends 2014
  warmup_months: [3, 6, 12, 24]                    # 3/6-mo windows < 365 days yield no train windows (seq_len 365)
  validation_period: ["2010-09-01", "2010-12-31"]
  evaluation_period: ["2011-01-01", "2014-12-31"]
  sequence_length: 365

model:
  pretrained_checkpoint: results/checkpoints/pretrain_subset200.pt

training:
  batch_size: 64
  epochs: 5
  patience: 3
  head_lr: 1.0e-3
  lstm_lr: 1.0e-5
  weight_decay: 0.0

output:
  table_path: results/min_data_sensitivity.csv
  summary_path: results/min_data_sensitivity.json
