name: walk_forward_little_nc_southeast_rain
stage: walk_forward
seed: 42
data:
  source: camels
  camels_root: data
  target_basin: 02128000
  sequence_length: 365
  full_period:
  - '1990-01-01'
  - '2014-12-31'
model:
  pretrained_checkpoint: results/multi_target/02128000/checkpoints/finetune_conservative.pt
  hidden_size: 256
  dropout: 0.4
walk_forward:
  initial_train_end: '2010-12-31'
  eval_end: '2014-12-31'
  refit_every_days: 90
  online_bias_correction: true
  val_tail_days: 90
  refit_train_start: '2009-01-01'
  fine_tune:
    head_lr: 0.001
    lstm_lr: 1.0e-05
    epochs_head_only: 3
    epochs_progressive: 0
    patience: 2
    unfreeze_fraction: 0.0
evaluation:
  lead_times:
  - 1
  - 3
  - 7
  threshold_specs:
  - kind: flood
    percentile: q95
  - kind: flood
    percentile: q99
  - kind: drought
    percentile: q5
  metrics:
  - NSE
  - KGE
  - PBIAS
  - AUC
  - F1
  - Brier
xai:
  enabled: false
output:
  results_path: results/multi_target/02128000/walk_forward.parquet
  warnings_path: results/multi_target/02128000/walk_forward_warnings.csv
  metrics_path: results/multi_target/02128000/walk_forward_metrics.json
