# Approach B INSIDE the walk-forward loop: progressive-unfreeze refits.
# Protocol matched to walk_forward.yaml (same warmup end, eval window, 90-day
# refit cadence, online bias correction, val_tail_days, refit_train_start) so
# A-vs-B stays a fair comparison under the corrected protocol.
name: walk_forward_progressive_target
stage: walk_forward
seed: 42

data:
  source: camels
  camels_root: data
  target_basin: "11264500"
  full_period: ["1990-01-01", "2014-12-31"]
  sequence_length: 365

model:
  pretrained_checkpoint: results/checkpoints/finetune_progressive.pt
  hidden_size: 256
  dropout: 0.4

walk_forward:
  approach: progressive
  initial_train_end: "2010-12-31"
  eval_end: "2014-12-31"
  refit_every_days: 90
  online_bias_correction: true
  val_tail_days: 90
  refit_train_start: "2009-01-01"
  fine_tune:
    head_lr: 1.0e-3
    lstm_lr: 1.0e-5
    epochs_head_only: 2
    epochs_progressive: 2
    patience: 2
    unfreeze_fraction: 0.25

evaluation:
  lead_times: [1, 3, 7]
  threshold_specs:
    - { kind: flood, percentile: q95 }
    - { kind: flood, percentile: q99 }
    - { kind: drought, percentile: q5 }
  metrics: [NSE, KGE, PBIAS, AUC, F1, Brier]

xai:
  enabled: false

output:
  results_path: results/walk_forward_progressive.parquet
  warnings_path: results/walk_forward_progressive_warnings.csv
  metrics_path: results/walk_forward_progressive_metrics.json
