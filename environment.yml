# Conda environment for hydro_tl_ews.
# For NVIDIA GPUs: after create, install CUDA PyTorch if needed:
#   pip install torch --index-url https://download.pytorch.org/whl/cu124
name: hydro_tl_ews
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.10
  - numpy>=1.24
  - pandas>=2.0
  - pyyaml>=6.0
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - pyarrow>=14.0
  - pytorch>=2.0
  - pip
  - pip:
      - shap>=0.44
      - dataretrieval>=1.0
